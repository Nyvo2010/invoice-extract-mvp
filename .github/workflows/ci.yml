name: CI
on: [push, pull_request]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install deps
        run: |
          if [ -f package.json ]; then npm ci; fi
      - name: Run tests
        run: |
          if [ -f package.json ]; then npm test || true; fi
